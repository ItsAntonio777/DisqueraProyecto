{% extends 'disquera/base.html' %}

{% block title %}
Checkout |
{% endblock %}

{% block content %}

<div class="container py-5">

    <h1 class="fw-bold mb-5">
        Checkout
    </h1>

    <div class="row">

        <div class="col-lg-7">

            <div class="card shadow border-0">

                <div class="card-body">

                    <h3 class="mb-4">
                        Dirección de envío
                    </h3>

                    <form method="POST">

                        {% csrf_token %}

                        {{ form.as_p }}

                        <button class="btn btn-success btn-lg w-100">
                            Pagar pedido
                        </button>

                    </form>

                </div>

            </div>

        </div>

        <div class="col-lg-5">

            <div class="card shadow border-0">

                <div class="card-body">

                    <h3 class="mb-4">
                        Resumen
                    </h3>

                    {% for item in items %}

                        <div class="d-flex justify-content-between mb-2">

                            <span>
                                {{ item.post.title }}
                            </span>

                            <span>
                                ${{ item.subtotal }}
                            </span>

                        </div>

                    {% endfor %}

                    <hr>

                    <h3 class="text-success fw-bold">
                        Total: ${{ total }}
                    </h3>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
